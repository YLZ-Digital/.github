    <linearGradient id="cyberCard" x1="1102" y1="356" x2="1196" y2="526" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#081A20"/>
      <stop offset="1" stop-color="#091621"/>
    </linearGradient>
    <linearGradient id="webSheen" x1="732" y1="116" x2="1192" y2="196" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DBEAFE" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#DBEAFE" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cyberSheen" x1="732" y1="346" x2="1192" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#CCFBF1" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#CCFBF1" stop-opacity="0"/>
