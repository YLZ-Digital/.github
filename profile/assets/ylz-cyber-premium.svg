<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">YLZ Digital Cyber Premium Banner</title>
  <desc id="desc">A dark premium hero banner for YLZ Digital featuring cyber themed accents and technology focused messaging.</desc>
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1190" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.55" stop-color="#081122"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0.15"/>
