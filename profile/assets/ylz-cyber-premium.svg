      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="webPanel" x1="700" y1="92" x2="1220" y2="338" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1730" stop-opacity="0.97"/>
      <stop offset="1" stop-color="#0A1324" stop-opacity="0.86"/>
    </linearGradient>
    <linearGradient id="cyberPanel" x1="700" y1="344" x2="1220" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071922" stop-opacity="0.97"/>
