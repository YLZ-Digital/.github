<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">YLZ Digital Cyber Premium Banner</title>
  <desc id="desc">A premium dark banner for YLZ Digital with clearly separated Web Development and Cyber Security panels and non-overlapping typography.</desc>
  <defs>
    <linearGradient id="bg" x1="88" y1="36" x2="1198" y2="612" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.54" stop-color="#071323"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="webPanel" x1="716" y1="100" x2="1216" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1730" stop-opacity="0.97"/>
      <stop offset="1" stop-color="#0A1324" stop-opacity="0.86"/>
    </linearGradient>
    <linearGradient id="cyberPanel" x1="716" y1="330" x2="1216" y2="558" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071922" stop-opacity="0.97"/>
