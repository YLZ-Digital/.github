    <linearGradient id="cyberPanel" x1="736" y1="328" x2="1206" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071922" stop-opacity="0.97"/>
      <stop offset="1" stop-color="#091222" stop-opacity="0.86"/>
