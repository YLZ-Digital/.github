    <linearGradient id="cyberCard" x1="1092" y1="368" x2="1208" y2="566" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#081A20"/>
      <stop offset="1" stop-color="#091621"/>
    </linearGradient>
    <linearGradient id="webSheen" x1="716" y1="104" x2="1210" y2="204" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DBEAFE" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#DBEAFE" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cyberSheen" x1="716" y1="356" x2="1210" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#CCFBF1" stop-opacity="0.1"/>
