    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B162B" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#091223" stop-opacity="0.72"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1038 154) rotate(90) scale(238 238)">
